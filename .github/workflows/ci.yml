name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: |
          uv run mypy onsetto-client/src/onsetto_client
          uv run mypy onsetto-scraper/src/onsetto_scraper

      - name: Test onsetto-client
        run: uv run pytest onsetto-client/tests/ --cov=onsetto_client --cov-report=term-missing

      - name: Test onsetto-scraper (unit only)
        run: uv run pytest onsetto-scraper/tests/ --cov=onsetto_scraper --cov-report=term-missing
